version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: oficina
      POSTGRES_PASSWORD: oficina
      POSTGRES_DB: oficina_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oficina -d oficina_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  db_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: oficina
      POSTGRES_PASSWORD: oficina
      POSTGRES_DB: oficina_test_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata_test:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: development
      DATABASE_URL: postgresql://oficina:oficina@db:5432/oficina_db
      TEST_DATABASE_URL: postgresql://oficina:oficina@db_test:5432/oficina_test_db
      SECRET_KEY: super-secret-key
      JWT_SECRET_KEY: super-jwt-key
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: >
      sh -c "flask db upgrade && python run.py"

volumes:
  pgdata:
  pgdata_test:
